name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: none

      - name: Run lint
        run: php tests/lint.php

      - name: Run unit tests
        run: |
          php tests/unit/config-loader.php
          php tests/unit/request-validator.php

      - name: Run integration tests
        run: php tests/integration/run.php

      - name: Build release archive
        run: php scripts/build-release.php "$GITHUB_REF_NAME"

      - name: Verify release archive
        run: php tests/release-archive.php

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/mini-s3-$GITHUB_REF_NAME.zip" \
            --title "$GITHUB_REF_NAME" \
            --notes "Release $GITHUB_REF_NAME"
