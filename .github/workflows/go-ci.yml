name: Go CI

on:
  push:
    paths:
      - 'go/**'
      - '.github/workflows/go-ci.yml'
      - '.github/workflows/go-release.yml'
  pull_request:
    paths:
      - 'go/**'
      - '.github/workflows/go-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go/go.sum
      - name: Vet
        working-directory: go
        run: go vet ./...
      - name: Build
        working-directory: go
        run: go build ./cmd/mini-s3
      - name: Test
        working-directory: go
        run: go test -race ./...

  cross-compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go/go.sum
      - name: Cross-compile ${{ matrix.goos }}/${{ matrix.goarch }}
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags "-s -w -X main.Version=ci" -o /dev/null ./cmd/mini-s3
